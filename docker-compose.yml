version: '3.8'

# ── Velox Local Development Stack ────────────────────────────────────────────
# Levanta PostgreSQL + Redis para desarrollo sin necesidad de servicios externos
#
# Uso:
#   docker compose up -d          → levantar en background
#   docker compose down           → detener
#   docker compose down -v        → detener y borrar volúmenes (reset DB)

services:
  postgres:
    image: postgres:16-alpine
    container_name: velox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     velox
      POSTGRES_PASSWORD: velox_dev_pass
      POSTGRES_DB:       velox
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velox"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velox-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
